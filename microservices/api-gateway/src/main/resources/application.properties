server.port=8085

spring.application.name=api-gateway

spring.cloud.gateway.discovery.locator.enabled=true
spring.cloud.gateway.discovery.locator.lower-case-service-id=true

# Auth Service - public endpoints
spring.cloud.gateway.routes[0].id=auth-service
spring.cloud.gateway.routes[0].uri=lb://auth-service
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/auth/**

# Room Service GET - public
spring.cloud.gateway.routes[1].id=room-service-public
spring.cloud.gateway.routes[1].uri=lb://room-service
spring.cloud.gateway.routes[1].predicates[0]=Path=/api/rooms/**
spring.cloud.gateway.routes[1].predicates[1]=Method=GET

# Room Service write - requires JWT
spring.cloud.gateway.routes[2].id=room-service-protected
spring.cloud.gateway.routes[2].uri=lb://room-service
spring.cloud.gateway.routes[2].predicates[0]=Path=/api/rooms/**
spring.cloud.gateway.routes[2].predicates[1]=Method=POST,PUT,DELETE
spring.cloud.gateway.routes[2].filters[0]=AuthenticationFilter

# Reservation Service - requires JWT
spring.cloud.gateway.routes[3].id=reservation-service
spring.cloud.gateway.routes[3].uri=lb://reservation-service
spring.cloud.gateway.routes[3].predicates[0]=Path=/api/reservations/**
spring.cloud.gateway.routes[3].filters[0]=AuthenticationFilter

# User Service - requires JWT
spring.cloud.gateway.routes[4].id=user-service
spring.cloud.gateway.routes[4].uri=lb://user-service
spring.cloud.gateway.routes[4].predicates[0]=Path=/api/users/**
spring.cloud.gateway.routes[4].filters[0]=AuthenticationFilter

# Swagger docs - Auth Service
spring.cloud.gateway.routes[5].id=auth-service-docs
spring.cloud.gateway.routes[5].uri=lb://auth-service
spring.cloud.gateway.routes[5].predicates[0]=Path=/auth-service/v3/api-docs/**
spring.cloud.gateway.routes[5].filters[0]=RewritePath=/auth-service/v3/api-docs/(?<remaining>.*), /v3/api-docs/${remaining}

# Swagger docs - Room Service
spring.cloud.gateway.routes[6].id=room-service-docs
spring.cloud.gateway.routes[6].uri=lb://room-service
spring.cloud.gateway.routes[6].predicates[0]=Path=/room-service/v3/api-docs/**
spring.cloud.gateway.routes[6].filters[0]=RewritePath=/room-service/v3/api-docs/(?<remaining>.*), /v3/api-docs/${remaining}

# Swagger docs - Reservation Service
spring.cloud.gateway.routes[7].id=reservation-service-docs
spring.cloud.gateway.routes[7].uri=lb://reservation-service
spring.cloud.gateway.routes[7].predicates[0]=Path=/reservation-service/v3/api-docs/**
spring.cloud.gateway.routes[7].filters[0]=RewritePath=/reservation-service/v3/api-docs/(?<remaining>.*), /v3/api-docs/${remaining}

# Swagger docs - User Service
spring.cloud.gateway.routes[8].id=user-service-docs
spring.cloud.gateway.routes[8].uri=lb://user-service
spring.cloud.gateway.routes[8].predicates[0]=Path=/user-service/v3/api-docs/**
spring.cloud.gateway.routes[8].filters[0]=RewritePath=/user-service/v3/api-docs/(?<remaining>.*), /v3/api-docs/${remaining}

eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.client.service-url.defaultZone=${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://eureka-server:8761/eureka/}
eureka.instance.prefer-ip-address=true

app.jwt.secret=SG90ZWxSZXNlcnZhdGlvblN5c3RlbVNlY3JldEtleUZvckpXVFRva2VuR2VuZXJhdGlvbkFuZFZhbGlkYXRpb24yMDI0

springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.urls[0].name=Auth Service
springdoc.swagger-ui.urls[0].url=/auth-service/v3/api-docs
springdoc.swagger-ui.urls[1].name=Room Service
springdoc.swagger-ui.urls[1].url=/room-service/v3/api-docs
springdoc.swagger-ui.urls[2].name=Reservation Service
springdoc.swagger-ui.urls[2].url=/reservation-service/v3/api-docs
springdoc.swagger-ui.urls[3].name=User Service
springdoc.swagger-ui.urls[3].url=/user-service/v3/api-docs

logging.level.org.springframework.cloud.gateway=INFO


logging.level.org.springframework.cloud.gateway=INFO

# Logging
logging.level.root=INFO
logging.file.name=/logs/api-gateway.log
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} - %msg%n